<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>EVA AI Assistant</title>
</head>
<body>

    <header id="navbar">
        <div class="logo">EVA AI</div>
    </header>

    <div class="main-container">

        <section class="hero-text-area">
            <p class="subtitle">Semana técnica CEEPPG</p>
            <h1>CONVERSE COM A<br>INTELIGÊNCIA</h1>
            <a href="https://eva-chat.netlify.app/">
            <button class="cta-button">
                <i class="fas fa-microphone"></i> INICIAR CONVERSA
            </button>
        </section>

        <div class="content-wrapper">

            <div class="eva-card">
                <img src="./img/EVA(1).png" alt="EVA Talking Assistant" class="character" />
            </div>

            <div class="feature-cards-grid">
                <!-- Redireciona para a página de Chat -->
                <a href="https://eva-chat.netlify.app/">
                    <div class="feature-card">
                        <i class="fas fa-comments"></i>
                        <h2>Chat</h2>
                        <p>Vamos te ajudar! Converse com a EVA para te ajudar a guiar o seu futuro</p>
                    </div>
                </a>
                
                <!-- Redireciona para a página de Configurações -->
                <a href="https://testevocacional-ceep.netlify.app/">
                    <div class="feature-card">
                        <i class="fas fa-cog"></i>
                        <h2>Teste vocacional</h2>
                        <p>Tome as Melhores Decisões para Sua Carreira!</p>
                    </div>
                </a>
                
                <!-- Redireciona para a página de Novidades -->
                <a href="https://manual-eva-ia.netlify.app/">
                    <div class="feature-card">
                        <i class="fas fa-globe"></i>
                        <h2>Saiba Mais</h2>
                        <p>Saiba mais sobre as novidades da nossa IA</p>
                    </div>
                </a>
            </div>
            
        </div>
    </div>

    <script>
        document.querySelector('.cta-button').addEventListener('click', () => {
             if ("speechSynthesis" in window) {
                 let msg = new SpeechSynthesisUtterance("Olá! Eu sou a EVA, pronta para ouvir você!");
                 window.speechSynthesis.speak(msg);
             } else {
                 alert("Seu navegador não suporta reconhecimento de voz.");
             }
        });
    </script>
</body>
</html>
